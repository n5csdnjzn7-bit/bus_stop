<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>屯門專線 - 玩具總動員主題顯示屏</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="屯門巴士屏">
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluent/180/000000/toy-story.png">

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #5cc0f4;
            background-image: 
                radial-gradient(circle at 20% 30%, #ffffff 0%, #ffffff 4%, transparent 5%),
                radial-gradient(circle at 25% 28%, #ffffff 0%, #ffffff 6%, transparent 7%),
                radial-gradient(circle at 30% 32%, #ffffff 0%, #ffffff 5%, transparent 6%),
                radial-gradient(circle at 70% 60%, #ffffff 0%, #ffffff 5%, transparent 6%),
                radial-gradient(circle at 75% 58%, #ffffff 0%, #ffffff 7%, transparent 8%),
                radial-gradient(circle at 80% 62%, #ffffff 0%, #ffffff 4%, transparent 5%);
            background-size: 400px 400px;
            font-family: "Arial Rounded MT Bold", "Chalkboard SE", "Comic Sans MS", "Mplus Rounded 1c", "微軟正黑體", sans-serif;
            margin: 0; padding: 10px; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }
        .container {
            display: flex; width: 100%; max-width: 1024px; height: 100%; max-height: 600px;
            background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border-radius: 24px; border: 6px solid #ffffff; padding: 15px; box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
        }
        .left-panel { width: 56%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding-right: 15px; border-right: 3px dashed rgba(255, 255, 255, 0.5); }
        
        /* 🌟 頂部標題列：拉寬右側區塊（min-width 加大到 220px），確保「即將到達」橫向一行完整顯示 */
        .board-header { display: flex; align-items: center; padding: 0 15px; height: 6%; font-size: 16px; font-weight: 900; color: #2f3542; }
        .header-main { flex-grow: 1; }
        .header-slots { display: flex; min-width: 220px; justify-content: flex-end; text-align: right; }
        .header-slot { width: 70px; margin-left: 5px; } 

        .bus-row { display: flex; align-items: center; background: rgba(255, 255, 255, 0.85); padding: 8px 15px; border-radius: 16px; height: 14%; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05); }
        
        .bus-badge { width: 85px; padding: 6px 0; text-align: center; font-size: 24px; font-weight: 900; border-radius: 12px; color: #fff; margin-right: 12px; box-shadow: 0 3px 0px rgba(0,0,0,0.2); }
        .kmb-bg { background-color: #ff4757; }
        .ctb-bg { background-color: #ffa502; color: #fff; }
        
        .station-info { flex-grow: 1; font-size: 14px; color: #57606f; font-weight: bold; overflow: hidden; }
        .station-info .dest { font-size: 24px; font-weight: 900; color: #2f3542; margin-bottom: 1px; } 
        
        /* 🌟 下方倒數時間格：同步拉寬到 220px 進行完美對齊 */
        .eta-times { display: flex; min-width: 220px; justify-content: flex-end; font-size: 22px; font-weight: 900; text-align: right; }
        .time-box { width: 70px; margin-left: 5px; } 
        .time-next { color: #2ed573; font-size: 25px; }
        .time-sub { color: #a4b0be; } 
        
        .no-service { font-size: 16px; color: #a4b0be; font-weight: 900; text-align: right; min-width: 220px; letter-spacing: 0.5px; }

        .right-panel { width: 44%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding-left: 15px; text-align: center; }
        
        .date-box { display: flex; flex-direction: column; gap: 4px; color: #2f3542; font-weight: 900; margin-top: 5px; background: rgba(255,255,255,0.5); padding: 8px 12px; border-radius: 20px; width: 95%; white-space: nowrap; }
        .date-en { font-size: 22px; color: #2f3542; letter-spacing: 0.5px; }
        .date-zh { font-size: 24px; color: #2f3542; }

        .clock-container { display: flex; flex-direction: column; align-items: center; margin: 2px 0; }
        .clock-box { font-size: 56px; font-weight: 900; color: #ffffff; line-height: 1; text-shadow: 3px 3px 0px #2f3542; display: flex; align-items: baseline; justify-content: center; }
        .clock-ampm { font-size: 24px; margin-left: 6px; font-weight: 900; color: #ffffff; text-shadow: 2px 2px 0px #2f3542; }
        .week-box { font-size: 16px; color: #ffffff; font-weight: 900; background: #2f3542; padding: 3px 10px; border-radius: 10px; margin-top: 4px; display: inline-block; }
        
        .weather-box { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; background: rgba(255,255,255,0.7); padding: 8px 12px; border-radius: 20px; width: 95%; }
        .weather-temp { font-size: 28px; color: #2f3542; font-weight: 900; }
        .weather-zh { font-size: 19px; color: #ff6b81; font-weight: 900; }
        .weather-en { font-size: 19px; color: #ff6b81; font-weight: 900; }

        .warning-bar { background: #ff4757; border: 2px solid #ffffff; color: #ffffff; font-size: 13px; font-weight: bold; padding: 6px 10px; border-radius: 12px; width: 90%; display: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .reminder-box { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 0 10px; font-size: 24px; font-weight: 900; line-height: 1.6; color: #2f3542; text-shadow: 1px 1px 0px #ffffff; }
        .reminder-highlight { color: #ff4757; font-size: 26px; display: inline-block; margin-top: 5px; }
        .footer { font-size: 11px; color: #ffffff; font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); width: 100%; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="left-panel">
        <div class="board-header">
            <div class="header-main">🚌 路線及目的地</div>
            <div class="header-slots">
                <div class="header-slot">即將到達</div>
                <div class="header-slot">下一班</div>
                <div class="header-slot">第三班</div>
            </div>
        </div>
        
        <div id="bus-board" style="display: flex; flex-direction: column; justify-content: space-between; height: 92%;">
            </div>
    </div>
    
    <div class="right-panel">
        <div>
            <div class="date-box">
                <div class="date-en" id="date-en">08 July 2026</div>
                <div class="date-zh" id="date-zh">二零二六年七月八日</div>
            </div>
            
            <div class="clock-container">
                <div class="clock-box"><span id="live-time">12:00</span><span class="clock-ampm" id="live-ampm">AM</span></div>
                <div class="week-box" id="live-week">Wednesday • 星期三</div>
            </div>
            
            <div class="weather-box">
                <div class="weather-temp" id="weather-temp">--°C</div>
                <div class="weather-zh" id="weather-zh">--</div>
                <div class="weather-en" id="weather-en">--</div>
            </div>
        </div>
        <div class="warning-bar" id="warning-box">⚠️ 注意：<span id="warning-list"></span></div>
        <div class="reminder-box">
            <div>出門口之前記得攞齊野呀!!<br><span class="reminder-highlight">Have a very good day❤️</span></div>
        </div>
        <div class="footer">
            <span id="update-time">更新時間: --:--:--</span>
        </div>
    </div>
</div>

<script>
    var CONFIG = {
        routes: [
            { no: '57M', company: 'kmb', station: '業旺邨', dest: '荔景北', base: [4, 16, 28] },
            { no: '59M', company: 'kmb', station: '龍逸邨', dest: '屯門碼頭', base: [2, 10, 18] },
            { no: '59X', company: 'kmb', station: '龍逸邨', dest: '屯門碼頭', base: [7, 15, 22] },
            { no: '960', company: 'kmb', station: '轉車站', dest: '會展站', base: [1, 12, 24] },
            { no: '961', company: 'kmb', station: '轉車站', dest: '灣仔會展', base: [9, 21, 33] },
            { no: '962G', company: 'ctb', station: '龍逸邨', dest: '屯門湖景', base: [14, 35, 50], isSpecial: true }
        ]
    };

    function toChineseYear(year) {
        var digits = ['零', '一', '二', '三', '四', '五', '六', '七', '八', '九'];
        var yearStr = year.toString();
        var result = '';
        for (var i = 0; i < yearStr.length; i++) {
            result += digits[parseInt(yearStr[i])];
        }
        return result + '年';
    }

    function toChineseNum(num) {
        var units = ['', '一', '二', '三', '四', '五', '六', '七', '八', '九', '十'];
        if (num <= 10) return units[num];
        if (num < 20) return '十' + units[num % 10];
        if (num % 10 === 0) return units[Math.floor(num / 10)] + '十';
        return units[Math.floor(num / 10)] + '十' + units[num % 10];
    }

    function updateClockAndWeather() {
        var now = new Date();
        
        var monthsEN = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        var dayEN = now.getDate();
        dayEN = dayEN < 10 ? '0' + dayEN : dayEN; 
        document.getElementById('date-en').innerText = dayEN + ' ' + monthsEN[now.getMonth()] + ' ' + now.getFullYear();

        var chineseYear = toChineseYear(now.getFullYear());
        var chineseMonth = toChineseNum(now.getMonth() + 1) + '月';
        var chineseDay = toChineseNum(now.getDate()) + '日';
        document.getElementById('date-zh').innerText = chineseYear + chineseMonth + chineseDay;
        
        var weekDaysEN = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        var weekDaysZH = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
        var currentDayNum = now.getDay();
        document.getElementById('live-week').innerText = weekDaysEN[currentDayNum] + ' • ' + weekDaysZH[currentDayNum];
        
        var hours = now.getHours();
        var minutes = now.getMinutes();
        var ampm = hours >= 12 ? 'PM' : 'AM';
        var displayHours = hours % 12;
        displayHours = displayHours ? displayHours : 12; 
        minutes = minutes < 10 ? '0' + minutes : minutes;
        var hoursStr = displayHours < 10 ? '0' + displayHours : displayHours;

        document.getElementById('live-time').innerText = hoursStr + ':' + minutes;
        document.getElementById('live-ampm').innerText = ampm;

        var temp = 26;
        var statusZH = "天氣晴朗";
        var statusEN = "Sunny ☀️";
        
        if (hours >= 7 && hours < 18) {
            temp = 31;
            statusZH = "炎熱有陽光";
            statusEN = "Hot and Sunny ☀️";
        } else if (hours >= 18 && hours < 23) {
            temp = 27;
            statusZH = "微風清涼";
            statusEN = "Cool and Breezy 🍃";
        } else {
            temp = 24;
            statusZH = "夜間平靜";
            statusEN = "Clear and Calm 🌙";
        }
        
        document.getElementById('weather-temp').innerText = temp + '°C';
        document.getElementById('weather-zh').innerText = statusZH;
        document.getElementById('weather-en').innerText = statusEN;
    }

    function updateBusDashboard() {
        var board = document.getElementById('bus-board');
        var htmlContent = '';
        var now = new Date();
        var currentSeconds = now.getSeconds();
        var currentDay = now.getDay();  
        var currentHour = now.getHours();
        var currentMin = now.getMinutes();

        var is962GOperating = false;
        if (currentDay >= 1 && currentDay <= 5) { 
            if (currentHour === 18 || (currentHour === 19 && currentMin <= 30)) {
                is962GOperating = true;
            }
        }

        for (var i = 0; i < CONFIG.routes.length; i++) {
            var route = CONFIG.routes[i];
            var etaHtml = '';

            if (route.isSpecial && !is962GOperating) {
                etaHtml = '<div class="no-service">暫無服務 (No Service)</div>';
            } else {
                var offset = Math.floor(currentSeconds / 20) % 3; 
                var t1 = (route.base[0] + offset) + 'm';
                var t2 = (route.base[1] + offset) + 'm';
                var t3 = (route.base[2] + offset) + 'm';

                etaHtml = '<div class="eta-times">' +
                    '<span class="time-box time-next">' + t1 + '</span>' +
                    '<span class="time-box time-sub">' + t2 + '</span>' +
                    '<span class="time-box time-sub">' + t3 + '</span>' +
                '</div>';
            }

            htmlContent += '<div class="bus-row">' +
                '<div class="bus-badge ' + route.company + '-bg">' + route.no + '</div>' +
                '<div class="station-info">' +
                    '<div class="dest">往 ' + route.dest + '</div>' +
                    '<div>📍 ' + route.station + '</div>' +
                '</div>' +
                etaHtml +
            '</div>';
        }
        board.innerHTML = htmlContent;
        
        var sec = now.getSeconds();
        sec = sec < 10 ? '0' + sec : sec;
        document.getElementById('update-time').innerText = '更新時間: ' + document.getElementById('live-time').innerText + ':' + sec + ' ' + document.getElementById('live-ampm').innerText;
    }

    updateClockAndWeather();
    updateBusDashboard();
    
    setInterval(updateClockAndWeather, 1000);
    setInterval(updateBusDashboard, 5000);
</script>

</body>
</html>
