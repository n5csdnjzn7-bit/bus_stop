<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港實時巴士到站顯示牌</title>
    <style>
        :root {
            --led-orange: #ff9900;
            --led-dim: #331f00;
            --bg-black: #111111;
            --panel-bg: #222222;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-black);
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #ffffff;
            margin-bottom: 10px;
            font-weight: 400;
        }

        /* 控制列 */
        .controls {
            margin-bottom: 20px;
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        select, button {
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 4px;
            border: 1px solid #444;
            background: #333;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #444;
        }

        .status-text {
            font-size: 14px;
            color: #aaa;
        }

        /* LED 顯示牌面板 */
        .led-panel {
            background-color: #050505;
            border: 4px solid #444;
            border-radius: 6px;
            width: 100%;
            max-width: 600px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            padding: 10px 0;
        }

        /* 標題欄 */
        .panel-header {
            display: flex;
            justify-content: space-between;
            padding: 5px 15px;
            border-bottom: 2px dashed #333;
            color: #888;
            font-size: 14px;
            font-weight: bold;
        }

        /* 每一行巴士班次 */
        .eta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #1a1a1a;
            font-family: monospace;
        }

        .eta-row:last-child {
            border-bottom: none;
        }

        /* LED 文字顏色 */
        .bus-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .route-badge {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            background: #cc0000; /* 預設九巴紅 */
            padding: 2px 8px;
            border-radius: 4px;
            min-width: 60px;
            text-align: center;
        }

        .route-badge.ctb {
            background: #003399; /* 城巴藍 */
        }

        .destination {
            font-size: 20px;
            color: var(--led-orange);
            text-shadow: 0 0 5px rgba(255, 153, 0, 0.5);
        }

        .time-info {
            text-align: right;
        }

        .countdown {
            font-size: 24px;
            font-weight: bold;
            color: var(--led-orange);
            text-shadow: 0 0 5px rgba(255, 153, 0, 0.5);
        }

        .exact-time {
            font-size: 12px;
            color: #666;
            margin-top: 2px;
        }

        .no-data {
            text-align: center;
            padding: 30px;
            color: #555;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h1>香港巴士實時到站顯示牌</h1>

    <!-- 路線選擇控制 -->
    <div class="controls">
        <label for="route-select">選擇監測車站：</label>
        <select id="route-select" onchange="changeRoute()">
            <!-- 格式: 公司|路線|車站ID|方向|車站名稱 (城巴方向沒用到，但九巴要) -->
            <option value="KMB|1A|N/A|inbound|尖沙咀碼頭總站 (九巴 1A)">尖沙咀碼頭總站 (九巴 1A 往中秀茂坪)</option>
            <option value="KMB|968|N/A|outbound|元朗西總站 (九巴 968)">元朗西總站 (九巴 968 往銅鑼灣)</option>
            <option value="CTB|102|002410|N/A|紅磡海底隧道收費廣場 (城巴 102)">紅隧收費廣場 (城巴 102 往美孚)</option>
            <option value="CTB|E21A|002769|N/A|旺角警署 (城巴 E21A)">旺角警署 (城巴 E21A 往逸東邨)</option>
        </select>
        
        <button onclick="refreshData()">手動刷新</button>
        <span class="status-text" id="sync-status">正在初始化...</span>
    </div>

    <!-- LED 顯示面板 -->
    <div class="led-panel">
        <div class="panel-header">
            <span id="panel-title">巴士站點</span>
            <span>預計到站 (分鐘)</span>
        </div>
        <div id="panel-content">
            <!-- 這裡會由 JavaScript 動態插入 -->
        </div>
    </div>

    <script>
        // 全域變數，用來管理計時器
        let updateTimerId = null;
        let countdownTimerId = null;
        let currentNextRefresh = 30; // 每 30 秒刷新一次

        // 初始化載入
        window.onload = function() {
            refreshData();
            // 設定自動刷新迴圈 (每 30 秒呼叫一次 API)
            updateTimerId = setInterval(refreshData, 30000);
            
            // 每秒更新一次介面上的倒數文字
            countdownTimerId = setInterval(updateCountdownText, 1000);
        };

        // 當使用者切換下拉選單時
        function changeRoute() {
            refreshData();
        }

        // 核心：獲取 API 數據並渲染介面
        async function refreshData() {
            const selectElement = document.getElementById('route-select');
            const [company, route, stopId, bound, stopName] = selectElement.value.split('|');
            
            document.getElementById('panel-title').innerText = stopName;
            const contentDiv = document.getElementById('panel-content');
            contentDiv.innerHTML = '<div class="no-data">數據更新中...</div>';
            
            // 重設倒數秒數
            currentNextRefresh = 30;
            updateStatusText();

            let url = '';
            // 根據不同巴士公司組合不同的 API URL
            if (company === 'KMB') {
                // 九巴直接查整條線最方便
                url = `https://etabus.gov.hk{route}/${bound}`;
            } else if (company === 'CTB') {
                // 城巴必須指定車站、路線
                url = `https://etabus.gov.hk{company}/${stopId}/${route}`;
            }

            try {
                const response = await fetch(url);
                const result = await response.json();
                let etaList = result.data || [];

                // 如果是九巴，因為拿到了全線資料，我們需要篩選出「首個車站」或特定序列來示意
                // 這裡簡單篩選前 3 筆非空數據
                if (company === 'KMB') {
                    etaList = etaList.filter(item => item.eta).slice(0, 3);
                } else {
                    // 城巴本身就只回傳該站的班次
                    etaList = etaList.filter(item => item.eta);
                }

                renderHtml(etaList, company, route);

            } catch (error) {
                console.error('API 讀取失敗:', error);
                contentDiv.innerHTML = '<div class="no-data">無法連線至政府開放數據平台</div>';
            }
        }

        // 將數據轉化為 LED 面板 HTML
        function renderHtml(etaList, company, route) {
            const contentDiv = document.getElementById('panel-content');
            
            if (etaList.length === 0) {
                contentDiv.innerHTML = '<div class="no-data">暫無班次資料 (可能已過尾班車)</div>';
                return;
            }

            let html = '';
            const now = new Date();

            etaList.forEach(info => {
                const etaTime = new Date(info.eta);
                // 計算剩餘分鐘數
                const diffMs = etaTime - now;
                let diffMins = Math.ceil(diffMs / 1000 / 60);
                
                if (diffMins < 0) diffMins = 0; // 已經到站或過時顯示 0

                // 處理顯示文字
                let countdownStr = diffMins === 0 ? "即將到站" : `${diffMins} 分鐘`;
                
                // 處理目的地與備註文字
                let dest = info.dest_tc || (company === 'KMB' ? '班次' : '未定');
                let rmk = info.rmk_tc ? ` (${info.rmk_tc})` : '';

                // 設定樣式類別
                const badgeClass = company === 'CTB' ? 'route-badge ctb' : 'route-badge';

                html += `
                    <div class="eta-row">
                        <div class="bus-info">
                            <span class="${badgeClass}">${route}</span>
                            <span class="destination">往 ${dest}${rmk}</span>
                        </div>
                        <div class="time-info">
                            <span class="countdown">${countdownStr}</span>
                            <div class="exact-time">定時: ${etaTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                        </div>
                    </div>
                `;
            });

            contentDiv.innerHTML = html;
        }

        // 更新狀態列的倒數計時文字
        function updateCountdownText() {
            if (currentNextRefresh > 0) {
                currentNextRefresh--;
            }
            updateStatusText();
        }

        function updateStatusText() {
            document.getElementById('sync-status').innerText = `將於 ${currentNextRefresh} 秒後自動更新`;
        }
    </script>
</body>
</html>
